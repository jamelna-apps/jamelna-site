alphabet-cloud-profitable-q4-2025:
  title: "Alphabet Q4 & FY2025 earnings release"
  author: "Alphabet Inc. (investor relations)"
  url: https://s206.q4cdn.com/479360582/files/doc_financials/2025/q4/2025q4-alphabet-earnings-release.pdf
