notes: >
  Basis: $20.9B (OpenAI FY2025 operating loss, excl. the one-time
  non-cash for-profit-conversion charge) + $3.0B (Anthropic FY2025 cash
  burn) = $23.9B. Google AI is excluded because Alphabet's AI activity
  is cross-subsidized internally by profitable search and cloud margins;
  no credible attributable "AI division loss" figure is publicly
  disclosed.


  Important caveats, surfaced on the methodology page:


  1. Apples vs oranges. OpenAI's $20.9B is an operating loss. Anthropic's
  $3.0B is cash burn — it includes capex-like items and so mixes them
  with recurring operating expense. A critic could argue the true
  comparable operating-loss figures differ somewhat.


  2. OpenAI's headline net loss is larger but misleading. The widely
  quoted ~$38.5B FY2025 net loss is inflated by a one-time, non-cash
  ~$41.55B charge from the for-profit conversion. The $20.9B operating
  loss is the right basis here, consistent with this page's approach of
  excluding non-cash items.


  3. Unaudited. Neither company files public financials. All figures
  come from leaked investor documents via NYT, Fortune, FT, CNBC,
  Reuters, and The Information.


  4. The Information's primary articles on both losses are paywalled.
  The figures here are matched against independent secondary reporting,
  but the primary articles were not read directly.


  5. "Subsidy" framing. These companies burn cash to grow, not because
  unit economics are broken. Anthropic's cash burn FELL from $5.6B
  (2024) to $3.0B (2025) as it neared operating profitability and its
  revenue run-rate climbed from ~$9B (end 2025) toward $30B+ (2026).
  The "subsidy" label reflects current cash-flow reality, not a claim
  of permanent unit-economics failure.


  6. Google AI exclusion is defensible but contestable. Alphabet's 2025
  AI infrastructure capex was approximately $91B (guided $175-185B for
  2026). A reasonable critic could argue some share of that capex, net
  of attributable revenue, constitutes a subsidy. It is surfaced in the
  methodology page as supplementary but not rolled into the counter.
