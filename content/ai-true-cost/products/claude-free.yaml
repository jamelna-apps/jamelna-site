id: claude-free
name: Claude Free
vendor: Anthropic
tier: free
price_paid_usd: 0.00
price_unit: monthly

assumed_usage:
  queries_per_month: 200
  avg_input_tokens: 800
  avg_output_tokens: 400
  primary_model: claude-haiku-4-5

cost_components:
  compute:
    value_usd: 0.39
    basis: >
      Claude Haiku 4.5 retail: $1/1M input + $5/1M output. At 200 queries ×
      (800 in + 400 out) = 0.16M input + 0.08M output = $0.16 + $0.40 = $0.56
      at Haiku rates. Free tier may route some queries to Sonnet ($3/$15) for
      harder prompts; midpoint of Haiku-only and mixed-model usage ≈ $0.39/mo.
    sources:
      - anthropic-api-pricing-2026

  training_amortization:
    value_usd: 0.05
    basis: >
      Haiku-class models are meaningfully cheaper to train than frontier
      (Epoch AI family estimates: $40-80M for frontier like GPT-4; Haiku-class
      likely <$20M). Amortized across ~30M MAU (web + mobile, per Business of
      Apps) × 24 months ≈ negligible per user per month.
    sources:
      - epoch-frontier-training-cost-2024
      - claude-mau-businessofapps-2026

  energy_water:
    value_usd: 0.01
    basis: >
      Same model-class energy/water figures as ChatGPT Free: 200 queries ×
      0.34 Wh ≈ $0.010/mo in electricity at US retail rates; water externality
      <$0.001/mo. Dollar impact trivial.
    sources:
      - altman-gentle-singularity-2025
      - luccioni-power-hungry-2024

  investor_subsidy:
    value_usd: 3.60
    basis: >
      Proportional attribution: Anthropic FY2024 cash burn $5.6B × 25% (consumer
      product share; Anthropic's revenue is ~70-75% enterprise API, so attributing
      all burn to Claude.ai consumer users overstates) ÷ 30M combined web+mobile
      MAU ÷ 12 months ≈ $3.60/user/month. Range without proportional attribution:
      $14-35/mo. This figure is LOW CONFIDENCE because Anthropic does not disclose
      free-user counts (we use Business of Apps scraper estimates) and the
      enterprise/consumer burn split is not officially disclosed. Methodology page
      explains the attribution choice in detail.
    sources:
      - anthropic-burn-2024-acquinox
      - anthropic-burn-2024-theinformation
      - claude-mau-businessofapps-2026

last_verified: "2026-04-23"
