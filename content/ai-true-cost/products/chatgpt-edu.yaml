id: chatgpt-edu
name: ChatGPT Edu
vendor: OpenAI
tier: education
price_paid_usd: 12.00
price_unit: monthly

assumed_usage:
  queries_per_month: 600
  avg_input_tokens: 840
  avg_output_tokens: 360
  primary_model: gpt-5.5-and-gpt-5.5-pro-mix

cost_components:
  compute:
    value_usd: 33.46
    basis: >
      80% gpt-5.5 + 20% gpt-5.5-pro usage mix (Edu seats get both). Total 720k
      tokens/mo.

      80% gpt-5.5 portion (576k tokens): 403k input × $5/M + 173k output
      × $30/M = $2.02 + $5.19 = $7.21.

      20% gpt-5.5-pro portion — accounts for gpt-5.5-pro's hidden reasoning
      tokens which OpenAI bills as output (3× reasoning multiplier used,
      conservative midpoint). 144k visible tokens at 70/30 = 101k input + 43k
      visible output. With 3× reasoning: billable output = 129k. Cost:
      101k × $30/M + 129k × $180/M = $3.03 + $23.22 = $26.25.

      Total compute: $7.21 + $26.25 = $33.46/mo per seat.

      Notable: Cal State's $16.9M 18-month contract covering 533k seats =
      $2.11/seat/month. At that price OpenAI loses money on compute alone
      ($33.46 > $2.11) — and the gap is now even larger than under the prior
      model generation. CSU is the clearest public "sell below cost" anchor in
      AI edtech.
    sources:
      - openai-api-pricing-2026
      - openai-help-edu-models-2026
      - csu-openai-contract-2025-laist

  training_amortization:
    value_usd: 0.12
    basis: >
      Pass-through from underlying OpenAI models. Edu seats consume both GPT-4o
      and o1 class models; blended training amortization across OpenAI's
      paying base ≈ $0.10-0.15/mo. Cited $0.12.
    sources:
      - epoch-frontier-training-cost-2024

  energy_water:
    value_usd: 0.16
    basis: >
      Higher than ChatGPT Plus by ~5× because Edu seats use o1 which is a larger
      / more-compute-hungry reasoning model. 600 queries × ~1.5 Wh avg (vs Plus
      0.34) = 0.9 kWh/mo × $0.15 ≈ $0.135 energy. Water sub-penny. Midpoint
      $0.16/mo.
    sources:
      - luccioni-power-hungry-2024
      - altman-gentle-singularity-2025
      - li-making-ai-thirsty-2023

  investor_subsidy:
    value_usd: 34.83
    basis: >
      OpenAI FY2025 operating loss $20.9B ÷ ~50M paying subs (April 2026) ÷ 12
      = $34.83/paying-user/mo (was $37.88 from FY2024's $5B ÷ 11M). Applied at
      the same corporate-wide rate as ChatGPT Plus since the loss attribution
      is corporate-wide, not tier-specific. Uses the operating loss rather than
      the larger ~$38.5B net loss, which is inflated by a one-time, non-cash
      ~$41.55B for-profit-conversion charge. Edu's deeper volume discounts (see
      price and compute notes) mean OpenAI's effective per-Edu-seat loss is
      arguably HIGHER than per-Plus-seat. Price paid is $12/seat/mo as the
      typical institutional mid-case; CSU's $2.11 floor is the outlier.
    sources:
      - openai-loss-2025
      - openai-50m-paying-subs-2026
      - csu-openai-contract-2025-laist
      - onlineeducation-chatgpt-edu-2024

last_verified: "2026-06-28"
