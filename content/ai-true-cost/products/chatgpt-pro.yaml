id: chatgpt-pro
name: ChatGPT Pro
vendor: OpenAI
tier: paid-consumer
price_paid_usd: 200.00
price_unit: monthly

assumed_usage:
  queries_per_month: 3000
  avg_input_tokens: 900
  avg_output_tokens: 600
  primary_model: gpt-5-and-o1-pro-mode

cost_components:
  compute:
    value_usd: 36.00
    basis: >
      3,000 queries × 1,500 tokens = 4.5M tokens/mo (60% input, 40% output).
      GPT-4o-class baseline: 2.7M × $2.50/M + 1.8M × $10/M = $6.75 + $18.00
      = $24.75. Plus ~30% o1 Pro mode at $15/$60 retail with 5-10× hidden
      reasoning tokens adds ~$11. Plus unknown Sora video cost. Total cited:
      ~$36/mo. Upper-bound case — o1 Pro mode compute isn't fully disclosed.
    sources:
      - openai-api-pricing-2026
      - chatgpt-pro-launch-openai-2024

  training_amortization:
    value_usd: 1.20
    basis: >
      Pro users consume ~15× Plus baseline tokens but are only ~5.8% of
      OpenAI's consumer base. Per-user training share scales proportionally:
      15 × $0.08 Plus baseline ≈ $1.20/mo.
    sources:
      - epoch-frontier-training-cost-2024
      - openai-50m-paying-subs-2026

  energy_water:
    value_usd: 0.75
    basis: >
      3,000 queries × 0.34 Wh × 3 (reasoning multiplier for o1 Pro) = ~3
      kWh/mo × $0.15 = $0.45. Water sub-cent at Altman's figures. Midpoint
      $0.75/mo including Sora.
    sources:
      - luccioni-power-hungry-2024
      - altman-gentle-singularity-2025
      - li-making-ai-thirsty-2023

  investor_subsidy:
    value_usd: 125.00
    basis: >
      OpenAI projected 2026 loss $14B (The Information). ~50M paying subs
      early 2026 (Lightcap / Business of Apps). Pro tier = ~5.8% of consumer
      sales, so ~2.9M Pro subs. Consumer-attributable burn estimated at 40%
      of $14B = $5.6B ÷ 12 = $466M/mo consumer burn. Proportional revenue
      allocation: Pro revenue ($580M/mo) is ~25% of consumer revenue.
      25% × $466M ÷ 2.9M Pro subs = $40/mo baseline. Inflate 3× for Pro
      users' disproportionate compute load (o1 Pro, unlimited GPT-5, Sora)
      ≈ $125/mo. Highly inferential — o1 Pro compute multiplier isn't
      public.
    sources:
      - openai-loss-2026-14b-theinformation
      - openai-loss-2024-fortune
      - openai-50m-paying-subs-2026
      - chatgpt-pro-launch-openai-2024

last_verified: "2026-04-24"
