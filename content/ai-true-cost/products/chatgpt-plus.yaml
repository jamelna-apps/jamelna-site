id: chatgpt-plus
name: ChatGPT Plus
vendor: OpenAI
tier: paid-consumer
price_paid_usd: 20.00
price_unit: monthly

assumed_usage:
  queries_per_month: 600
  avg_input_tokens: 800
  avg_output_tokens: 400
  primary_model: gpt-5.5

cost_components:
  compute:
    value_usd: 9.60
    basis: >
      gpt-5.5 (chat-latest) API retail pricing: $5/1M input tokens + $30/1M output tokens.
      At assumed usage (480k input + 240k output tokens/mo): 480k × $5 + 240k × $30
      = $2.40 + $7.20 = $9.60. API retail used rather than cost-to-serve because the
      thesis is "what would you pay at market rates" — API is what a third-party
      product would pay today.
    sources:
      - openai-api-pricing-2026

  training_amortization:
    value_usd: 0.33
    basis: >
      GPT-4 training cost $78.4M (Epoch AI) ÷ 24-month useful life ÷ 10M ChatGPT
      Plus subscribers = $0.327/Plus-user/month. Reasonable range $0.14–$0.65
      depending on amortization period (12–24 months) and paid-user denominator
      (10–20M). GPT-4o training cost not publicly disclosed; assumed same order
      of magnitude as GPT-4.
    sources:
      - epoch-frontier-training-cost-2024
      - theinformation-11m-chatgpt-subs-2024

  energy_water:
    value_usd: 0.03
    basis: >
      Energy: 0.34 Wh/query × 600 queries = 204 Wh/mo × $0.15/kWh (US retail avg)
      = $0.0306/mo. Water: 0.000085 gal × 600 = 0.051 gal × $0.002/gal ≈ $0.0001/mo.
      Uses OpenAI's own self-reported figures (Altman 2025) as the upper bound; the
      peer-reviewed Luccioni paper reports 0.047 Wh/query for BLOOMz-class models
      which would yield ~$0.004/mo. Either way the dollar externality is trivial.
      The real environmental argument is aggregate carbon/water stress, not priced
      cost per user.
    sources:
      - altman-gentle-singularity-2025
      - luccioni-power-hungry-2024
      - li-making-ai-thirsty-2023

  investor_subsidy:
    value_usd: 34.83
    basis: >
      OpenAI FY2025 operating loss $20.9B ÷ ~50M total paying subscribers
      (all tiers, April 2026) ÷ 12 months = $34.83 per paying user per month
      (was $37.88 from FY2024's $5.0B loss ÷ 11M subs). Uses the operating
      loss rather than the larger ~$38.5B net loss because that net figure is
      inflated by a one-time, non-cash ~$41.55B for-profit-conversion charge;
      the operating loss is consistent with this page's "exclude non-cash
      items" approach. Both numerator and denominator use the most recent
      2025/early-2026 vintage.
    sources:
      - openai-loss-2025
      - openai-50m-paying-subs-2026

last_verified: "2026-06-28"
